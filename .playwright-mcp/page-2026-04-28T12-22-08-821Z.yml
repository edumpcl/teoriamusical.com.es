        - paragraph [ref=e34]:
          - text: El intervalo de
          - strong [ref=e35]: tercera
          - text: es el corazón de la armonía tonal. Es la distancia que se utiliza para construir los acordes básicos (tríadas) y determina si un acorde suena feliz (mayor) o triste (menor).
        - heading "1. Truco de Análisis Visual" [level=2] [ref=e36]
        - paragraph [ref=e37]: "Las terceras son muy fáciles de identificar en el pentagrama porque las dos notas comparten siempre la misma \"naturaleza\":"
        - paragraph [ref=e39]:
          - strong [ref=e40]: "La regla del salto:"
          - text: En una tercera, las notas saltan exactamente una posición.
          - text: • Si la nota inferior está en una
          - strong [ref=e41]: línea
          - text: ", su tercera estará en la"
          - strong [ref=e42]: siguiente línea
          - text: superior o inferior.
          - text: • Si la nota inferior está en un
          - strong [ref=e43]: espacio
          - text: ", su tercera estará en el"
          - strong [ref=e44]: siguiente espacio
          - text: .
          - text: Visualmente, queda un hueco libre (una línea o un espacio) entre ambas notas.
        - heading "2. Tabla de Referencia Técnica" [level=2] [ref=e45]
