      - paragraph [ref=e30]:
        - text: El lenguaje de la música es universal, pero para dominarlo y comprender en profundidad cómo interactúan los sonidos, es fundamental conocer sus bases. Bienvenido al
        - strong [ref=e31]: Diccionario Musical
        - text: ", el punto de partida perfecto para estudiantes, músicos y curiosos que deseen asimilar la teoría de la música desde sus fundamentos más elementales."
      - paragraph [ref=e32]: En el aprendizaje musical, cada detalle importa. Desde saber cómo colocar e identificar correctamente las notas en el pentagrama de acuerdo a las distintas claves, hasta entender de forma precisa cómo se construye el ritmo o cómo se entrelazan diferentes sonidos armónicos. A menudo, aprender solfeo y teoría puede parecer árido o demasiado estricto, pero el objetivo de esta biblioteca de conocimientos es simplificar cada término —como compás, tono o inversión— para que puedas trasladarlo directamente a tu piano, guitarra o instrumento de viento.
      - paragraph [ref=e33]: Navega a través de las diferentes secciones de este manual para descubrir la base real de las partituras. Tanto si estás preparando una prueba de acceso al conservatorio, buscas componer tus propias melodías o simplemente tienes curiosidad por entender por qué una canción suena bien, en nuestro diccionario musical encontrarás todas las respuestas e ilustraciones paso a paso.
