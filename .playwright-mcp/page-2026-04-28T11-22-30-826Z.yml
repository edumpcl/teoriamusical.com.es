    - heading "Tonalidades" [level=1] [ref=e28]
    - article [ref=e30]:
      - heading "Aprende a reconocer cualquier tonalidad a simple vista" [level=2] [ref=e31]
      - paragraph [ref=e32]:
        - text: Saber identificar la tonalidad de una pieza musical con tan solo mirar los sostenidos o bemoles que aparecen al principio del pentagrama (la
        - strong [ref=e33]: armadura musical
        - text: ) es como tener un superpoder de descodificación masiva. Una vez te sabes el truco, no tendrás que adivinar ni una sola nota más.
      - paragraph [ref=e34]:
        - text: Este módulo de ejercicios está diseñado en base a trucos visuales para tu mente. Entrenarás tu visión periférica para captar la tonalidad en fracciones de segundo. A continuación te repasamos
        - strong [ref=e35]: las dos reglas de oro
        - text: "infalibles de los estudiantes de solfeo avanzado:"
      - heading "El orden constante de las alteraciones" [level=2] [ref=e36]
      - paragraph [ref=e37]: "Antes de aplicar cualquier truco visual a los ejercicios gráficos, debes memorizar a fuego como si fuera un solo bloque silábico esta secuencia imperturbable. Es el orden natural en el que siempre aparecen las alteraciones en el pentagrama:"
      - list [ref=e38]:
        - listitem [ref=e39]:
          - strong [ref=e40]: "Orden de aparición de los Sostenidos (#):"
          - text: Fa - Do - Sol - Re - La - Mi - Si
        - listitem [ref=e41]:
          - strong [ref=e42]: "Orden de aparición de los Bemoles (b):"
          - text: Si - Mi - La - Re - Sol - Do - Fa
          - emphasis [ref=e43]: (que es exactamente lo inverso a los sostenidos)
      - heading "1. El truco visual para las Armaduras con Sostenidos" [level=2] [ref=e44]
      - paragraph [ref=e45]: "Cuando te enfrentes a una partitura que contenga uno o varios sostenidos apilados en su armadura, el método resolutivo es casi automático:"
      - list [ref=e46]:
        - listitem [ref=e47]:
          - text: Fija tu mirada gráficamente solo en el
          - strong [ref=e48]: último sostenido
          - text: (el que está dibujado más hacia la derecha en la partitura antes de que empiecen las notas reales).
        - listitem [ref=e49]: Súbele virtualmente **medio tono (un semitono)** al nombre de esa nota.
        - listitem [ref=e50]:
          - text: ¡Et voilà! Esa nota a la que acabas de llegar saltando medio tono
          - strong [ref=e51]: es el nombre de tu Tonalidad Mayor.
      - paragraph [ref=e52]:
        - strong [ref=e53]: "Ejemplo práctico:"
        - text: Si la armadura tiene tres sostenidos (Fa#, Do#, Sol#). Tomamos el último que ves (Sol#). Si subes mentalmente solo medio tono arriba de esa nota en tu cabeza llegas instantáneamente a
        - emphasis [ref=e54]: La
        - text: . Por tanto, tu obra está en
        - strong [ref=e55]: La Mayor
        - text: .
      - heading "2. El truco visual secreto para las Armaduras con Bemoles" [level=2] [ref=e56]
      - paragraph [ref=e57]: "Con los bemoles (b) el truco es aún más rápido de realizar en tu cerebro, ya que no tienes casi ni que calcular notas musicales ni distancias en el teclado:"
      - list [ref=e58]:
        - listitem [ref=e59]:
          - text: Revisa la armadura hasta localizar gráficamente el
          - strong [ref=e60]: penúltimo bemol
          - text: de la secuencia perimetral de alteraciones escrita.
        - listitem [ref=e61]:
          - text: Ese bemol que acabas de mirar, tal cual, con su nombre y apellido,
          - strong [ref=e62]: le da el nombre exacto a tu Tonalidad Mayor.
      - paragraph [ref=e63]:
        - strong [ref=e64]: "Ejemplo práctico:"
        - text: Tienes una partitura con la armadura atestada con cuatro bemoles ubicados en este orden (Sib, Mib, Lab, Reb). Te fijas en lectura visual solo en el penúltimo (hacia la izquierda del de la punta) y ves que es un Lab. Por tanto, la pieza de forma matemática está fijada en terreno de
        - strong [ref=e65]: La bemol Mayor (Lab Mayor)
        - text: .
      - paragraph [ref=e66]:
        - emphasis [ref=e67]: "Excepción Inamovible:"
        - text: Este truco no sirve cuando solo hay un bemol en la pauta (ya que carece de penúltimo). Debes memorizar hoy mismo que
        - strong [ref=e68]: 1 solo bemol (Sib) equivale a Fa Mayor
        - text: siempre en cualquier compás.
      - table [ref=e69]:
        - rowgroup [ref=e70]:
          - row "Símbolo de la Clave Foco de Atención Visual (El Truco) Cómo hallar la Tonalidad menor (Relativa)" [ref=e71]:
            - columnheader "Símbolo de la Clave" [ref=e72]
            - columnheader "Foco de Atención Visual (El Truco)" [ref=e73]
            - columnheader "Cómo hallar la Tonalidad menor (Relativa)" [ref=e74]
        - rowgroup [ref=e75]:
          - row "Armadura con Sostenidos Buscar el último (derecha) y subir 1 semitono mentalmente. Bajar visualmente una tercera menor entera a la respuesta." [ref=e76]:
            - cell "Armadura con Sostenidos" [ref=e77]:
              - strong [ref=e78]: Armadura con Sostenidos
            - cell "Buscar el último (derecha) y subir 1 semitono mentalmente." [ref=e79]
            - cell "Bajar visualmente una tercera menor entera a la respuesta." [ref=e80]
          - row "Armadura con Bemoles Mirar y leer directamente el penúltimo del pentagrama. Reducir igual una tercera menor acústica." [ref=e81]:
            - cell "Armadura con Bemoles" [ref=e82]:
              - strong [ref=e83]: Armadura con Bemoles
            - cell "Mirar y leer directamente el penúltimo del pentagrama." [ref=e84]
            - cell "Reducir igual una tercera menor acústica." [ref=e85]
      - paragraph [ref=e86]:
        - text: 💡
        - strong [ref=e87]: "Dato de solfeo curioso:"
        - text: Las tonalidades mayores nunca viajan solas, siempre llevan una compañera gemela de la mano, con sus mismas notas e idéntica armadura de clave pero sonando triste. Se denominan Tonalidades Relativas. Cuando hayas hallado la Mayor con tus supertrucos, sencillamente baja acústicamente o gráficamente una
        - strong [ref=e88]: Tercera menor
        - text: entera (1 tono y un semitono juntos de distancia) para descubrir cómo se llama su versión menor hermanada oculta.
