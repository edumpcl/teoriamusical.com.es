      - generic [ref=e164]:
        - heading "Preguntas Frecuentes" [level=2] [ref=e166]
        - generic [ref=e167]:
          - generic [ref=e168]:
            - heading "¿ Cómo funciona el afinador online?" [level=3] [ref=e169]:
              - strong [ref=e170]: ¿
              - text: Cómo funciona el afinador online?
            - paragraph [ref=e171]: Simplemente pulsa el botón de micrófono y otorga el permiso de audio a tu navegador. Toca una cuerda o nota de tu instrumento y el afinador detectará automáticamente la nota musical (Do, Re, Mi, Fa, Sol, La, Si). Ajusta la tensión hasta que el medidor quede afinado en el centro.
          - generic [ref=e172]:
            - heading "¿ Es gratis usar este afinador musical?" [level=3] [ref=e173]:
              - strong [ref=e174]: ¿
              - text: Es gratis usar este afinador musical?
            - paragraph [ref=e175]: Sí, este afinador interactivo es 100% gratuito. No requiere suscripciones, pagos ni descargas de ninguna aplicación externa. Puedes usar la herramienta tantas veces como necesites directamente desde la web.
          - generic [ref=e176]:
            - heading "¿ Funciona en teléfonos móviles y ordenadores?" [level=3] [ref=e177]:
              - strong [ref=e178]: ¿
              - text: Funciona en teléfonos móviles y ordenadores?
            - paragraph [ref=e179]: Absolutamente. Es totalmente compatible con cualquier dispositivo moderno que cuente con un navegador actualizado (Chrome, Safari, Mozilla, Edge) y un micrófono. Funciona de manera impecable tanto en Android e iPhone como en sistemas Windows y Mac.
          - generic [ref=e180]:
            - heading "¿ Qué instrumentos puedo afinar acá?" [level=3] [ref=e181]:
              - strong [ref=e182]: ¿
              - text: Qué instrumentos puedo afinar acá?
            - paragraph [ref=e183]: Nuestro afinador cubre un rango frecuencial completo y dispone de ajuste de transposición. Gracias a esto, puedes afinar guitarras (clásicas, acústicas o eléctricas), ukeleles, bajos, violines, violonchelos y la inmensa mayoría de instrumentos acústicos siempre que tu micrófono recoja el sonido.
